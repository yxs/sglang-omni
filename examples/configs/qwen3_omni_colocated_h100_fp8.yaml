# SPDX-License-Identifier: Apache-2.0
# FP8 colocated profile for the H100 video CI stages (2 DP replicas behind the router).

config_cls: Qwen3OmniSpeechColocatedPipelineConfig
name: qwen3-omni-colocated-h100-fp8
model_path: marksverdhei/Qwen3-Omni-30B-A3B-FP8
relay_backend: shm

stage_overrides:
  image_encoder:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.025

  audio_encoder:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.025

  thinker:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.55  # effective 0.50 after default encoder_mem_reserve 0.05

  talker_ar:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.12

  code2wav:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.02
