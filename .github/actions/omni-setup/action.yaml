name: Omni CI Setup
description: Restore a prepared Omni virtualenv and run common pre-test setup.

inputs:
  venv-name:
    description: Name of the virtualenv to restore and activate.
    required: true
  install-deps:
    description: Prepare or refresh the requested virtualenv before running tests.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Validate PR-scoped CI home
      shell: bash
      run: bash .github/scripts/validate_omni_ci_home.sh

    - name: Align CI cache home
      shell: bash
      run: |
        echo "HOME=/github/home" >> "${GITHUB_ENV}"
        echo "HF_HOME=/github/home/.cache/huggingface" >> "${GITHUB_ENV}"
        echo "MODELSCOPE_CACHE=/github/home/.cache/modelscope" >> "${GITHUB_ENV}"
        echo "XDG_CACHE_HOME=${OMNI_CI_HOME}/.cache" >> "${GITHUB_ENV}"
        echo "HF_HUB_DISABLE_XET=1" >> "${GITHUB_ENV}"
        echo "HF_HUB_ENABLE_HF_TRANSFER=0" >> "${GITHUB_ENV}"
        echo "HF_ENDPOINT=${HF_ENDPOINT:-https://huggingface.co}" >> "${GITHUB_ENV}"
        # PyPI mirror + shared wheel cache (HF mirror does not accelerate pip/uv).
        echo "UV_INDEX_URL=${UV_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}" >> "${GITHUB_ENV}"
        echo "UV_CACHE_DIR=/github/home/.cache/uv" >> "${GITHUB_ENV}"

    - name: Restore cache
      shell: bash
      env:
        VENV_NAME: ${{ inputs.venv-name }}
      run: |
        HOST="${OMNI_CI_HOME}/${VENV_NAME}"
        if [ -d "${HOST}" ] && [ -n "$(ls -A "${HOST}/")" ]; then
          rm -rf "./${VENV_NAME}"
          ln -sfn "${HOST}" "./${VENV_NAME}"
        fi

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      shell: bash
      env:
        VENV_NAME: ${{ inputs.venv-name }}
      run: bash .github/scripts/prepare_omni_venv.sh "${VENV_NAME}"

    - name: Validate or recover prepared environment
      if: ${{ inputs.install-deps != 'true' }}
      shell: bash
      env:
        VENV_NAME: ${{ inputs.venv-name }}
      run: |
        if [ -x "${VENV_NAME}/bin/python" ] \
          && "${VENV_NAME}/bin/python" -c "import torch; import av; from whisper.normalizers import EnglishTextNormalizer" 2>/dev/null; then
          echo "Prepared ${VENV_NAME} environment is available under ${OMNI_CI_HOME}."
          exit 0
        fi

        echo "::warning::Prepared ${VENV_NAME} environment is missing or incomplete under ${OMNI_CI_HOME}; rebuilding it for this job."
        bash .github/scripts/prepare_omni_venv.sh "${VENV_NAME}"
    - name: Remove stale flashinfer JIT artifacts
      shell: bash
      run: |
        # Note:(Chenchen Hong) On the hongccc/sglang-omni:dev (CUDA 13) image the
        # flashinfer-python 0.6.11.post1 wheel JIT-compiles its kernels against the
        # base image's matching cu13 toolkit. We no longer preinstall a
        # flashinfer-jit-cache wheel: the only published jit-cache builds are
        # 0.6.13 (cu128/cu129/cu130) and do not match the pinned 0.6.11.post1,
        # and the prior cu128 pin mismatched the cu13 runtime. Wipe any stale
        # JIT artifacts so the cu13 kernels compile cleanly on first use.
        rm -rf "${OMNI_CI_HOME}/.cache/flashinfer"

    - name: Kill GPU processes
      shell: bash
      run: |
        bash .github/scripts/delete_gpu_process.sh
