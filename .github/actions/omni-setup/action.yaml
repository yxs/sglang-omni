name: Omni CI Setup
description: Restore a prepared Omni virtualenv and run common pre-test setup.

inputs:
  venv-name:
    description: Name of the virtualenv to restore and activate.
    required: true
  install-deps:
    description: Prepare or refresh the requested virtualenv before running tests.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Validate PR-scoped CI home
      shell: bash
      run: bash .github/scripts/validate_omni_ci_home.sh

    - name: Align CI cache home
      shell: bash
      run: |
        echo "HOME=/github/home" >> "${GITHUB_ENV}"
        echo "HF_HOME=/github/home/.cache/huggingface" >> "${GITHUB_ENV}"
        echo "MODELSCOPE_CACHE=/github/home/.cache/modelscope" >> "${GITHUB_ENV}"
        echo "XDG_CACHE_HOME=${OMNI_CI_HOME}/.cache" >> "${GITHUB_ENV}"
        echo "HF_HUB_DISABLE_XET=1" >> "${GITHUB_ENV}"
        echo "HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}" >> "${GITHUB_ENV}"
        # PyPI mirror + shared wheel cache (HF mirror does not accelerate pip/uv).
        echo "UV_INDEX_URL=${UV_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}" >> "${GITHUB_ENV}"
        echo "UV_CACHE_DIR=/github/home/.cache/uv" >> "${GITHUB_ENV}"

    - name: Restore cache
      shell: bash
      env:
        VENV_NAME: ${{ inputs.venv-name }}
      run: |
        HOST="${OMNI_CI_HOME}/${VENV_NAME}"
        if [ -d "${HOST}" ] && [ -n "$(ls -A "${HOST}/")" ]; then
          rm -rf "./${VENV_NAME}"
          ln -sfn "${HOST}" "./${VENV_NAME}"
        fi

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      shell: bash
      env:
        VENV_NAME: ${{ inputs.venv-name }}
      run: bash .github/scripts/prepare_omni_venv.sh "${VENV_NAME}"

    - name: Validate prepared environment
      if: ${{ inputs.install-deps != 'true' }}
      shell: bash
      env:
        VENV_NAME: ${{ inputs.venv-name }}
      run: |
        test -x "${VENV_NAME}/bin/python" || {
          echo "Prepared ${VENV_NAME} environment is missing under ${OMNI_CI_HOME}. Run the setup stage first."
          exit 1
        }
        "${VENV_NAME}/bin/python" -c "import torch" 2>/dev/null || {
          echo "Cached venv is corrupted (torch not importable). Re-run the setup stage."
          exit 1
        }
    - name: Remove flashinfer
      shell: bash
      run: |
        # Runtime JIT artifacts only; host wheel cache is under
        # /github/home/.cache/flashinfer-jit-cache/ and is never removed here.
        rm -rf "${OMNI_CI_HOME}/.cache/flashinfer"

    - name: Ensure flashinfer-jit-cache
      shell: bash
      env:
        VENV_NAME: ${{ inputs.venv-name }}
      run: |
        bash .github/scripts/install_flashinfer_jit_cache.sh "${VENV_NAME}"
        echo "FLASHINFER_DISABLE_VERSION_CHECK=1" >> "${GITHUB_ENV}"

    - name: Kill GPU processes
      shell: bash
      run: |
        bash .github/scripts/delete_gpu_process.sh
