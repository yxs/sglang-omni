name: S2-Pro CI Setup
description: Restore the prepared S2-Pro environment and run common pre-test setup.

inputs:
  install-deps:
    description: Prepare the shared omni-s2pro virtualenv.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Restore cache
      shell: bash
      run: |
        if [ -d /github/home/omni-s2pro ] && [ ! -z "$(ls -A /github/home/omni-s2pro/)" ]; then
          cp -p -r /github/home/omni-s2pro ./omni-s2pro
        fi

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      shell: bash
      run: |
        if [ -d omni-s2pro ] && ! omni-s2pro/bin/python -c "import torch" 2>/dev/null; then
          echo "Cached venv is corrupted, removing..."
          rm -rf omni-s2pro
        fi
        if [ ! -d omni-s2pro ]; then
          uv venv omni-s2pro -p 3.11
        fi
        source omni-s2pro/bin/activate
        uv pip install -v -e ".[s2pro,dev]"

    - name: Validate prepared environment
      if: ${{ inputs.install-deps != 'true' }}
      shell: bash
      run: |
        test -x omni-s2pro/bin/python || {
          echo "Prepared omni-s2pro environment is missing. Run the docs stage first."
          exit 1
        }

    - name: Remove flashinfer
      shell: bash
      run: |
        rm -rf /github/home/.cache/flashinfer

    - name: Kill GPU processes
      shell: bash
      run: |
        bash .github/scripts/delete_gpu_process.sh
