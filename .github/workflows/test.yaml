name: PR Test

on:
  workflow_call:

env:
  OMNI_CI_HOME: >-
    ${{ github.event_name == 'pull_request'
        && format('/github/home/pr-{0}', github.event.pull_request.number)
        || format('/github/home/run-{0}', github.run_id) }}

# Invoked by omni-ci.yaml after shared setup (first suite in the omni-ci
# sequence: PR Test → TTS → Qwen3-Omni). Restores omni only.

jobs:
  unit-test:
    name: unit-test
    runs-on: [self-hosted, h100]
    container:
      image: crpi-n6adu6llixz83q37.cn-hangzhou.personal.cr.aliyuncs.com/hongccc/sglang-omni:dev
      options: >-
        --rm
        -e NVIDIA_VISIBLE_DEVICES=6,7
        -v /dev/shm:/dev/shm
        -v /data/cache/huggingface:/github/home/.cache/huggingface
        -v /data/cache/huggingface:/root/.cache/huggingface
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni

      - name: Run test
        timeout-minutes: 30
        shell: bash
        run: |
          source omni/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/ -v -m "not benchmark" -x
