name: Qwen3-Omni CI

on:
  pull_request:
    branches: [main]
    types: [labeled, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: qwen3-omni-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OMNI_CI_HOME: >-
    ${{ github.event_name == 'pull_request'
        && format('/github/home/pr-{0}/qwen3', github.event.pull_request.number)
        || format('/github/home/run-{0}/qwen3', github.run_id) }}

# DAG:
#   setup (install-deps under OMNI_CI_HOME + verify model weights)
#     └── stage 1 … stage 11 (restore only; parallel after setup)
#           └── cleanup on full success only (kept on failure for re-run)
#   PR close → cleanup-pr-ci-home-on-close.yaml removes /github/home/pr-N/

jobs:
  setup:
    name: setup - omni-qwen3 venv
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3
          install-deps: "true"

      - uses: ./.github/actions/omni-save-cache
        with:
          venv-name: omni-qwen3

      - name: Ensure Qwen3 CI model weights
        shell: bash
        env:
          HF_ENDPOINT: https://hf-mirror.com
        run: |
          bash .github/scripts/ensure_hf_models.sh omni-qwen3 \
            Qwen/Qwen3-Omni-30B-A3B-Instruct \
            marksverdhei/Qwen3-Omni-30B-A3B-FP8

  stage-1-thinker:
    name: stage 1 - thinker length integration
    needs: setup
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 20
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run thinker length integration test
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_qwen3_omni_thinker_length.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: thinker-length

  stage-2-tts:
    name: stage 2 - TTS speed + WER + SIM
    needs: setup
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 25
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Prepare speaker similarity assets
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          python -m benchmarks.metrics.speaker_similarity_assets --warm-cache
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SEEDTTS_SIM_CACHE_DIR: /github/home/seedtts-wavlm-sim

      - name: Run TTS CI (speed + WER + SIM)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_qwen3_omni_tts_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          SEEDTTS_SIM_CACHE_DIR: /github/home/seedtts-wavlm-sim
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS (speed + WER + SIM)
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
            */similarity_results.json
          artifact-upload-name: qwen3-omni-tts-results
          artifact-upload-path: /tmp/**/*_results.json

