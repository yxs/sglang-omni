name: Qwen3-Omni CI

on:
  workflow_call:

permissions:
  contents: read
  checks: read
  pull-requests: read

env:
  OMNI_CI_HOME: >-
    ${{ github.event_name == 'pull_request'
        && format('/github/home/pr-{0}', github.event.pull_request.number)
        || format('/github/home/run-{0}', github.run_id) }}
  PYTORCH_ALLOC_CONF: expandable_segments:True

# Invoked by omni-ci.yaml after TTS CI (last benchmark suite in the omni-ci
# sequence: PR Test → TTS → Qwen3-Omni). Restores omni only.

jobs:
  stage-1-thinker:
    name: stage 1 - thinker length integration
    runs-on: [self-hosted, h100]
    timeout-minutes: 20
    container:
      image: crpi-n6adu6llixz83q37.cn-hangzhou.personal.cr.aliyuncs.com/hongccc/sglang-omni:dev
      options: >-
        --rm
        -e NVIDIA_VISIBLE_DEVICES=6,7
        --cap-add=SYS_PTRACE
        -v /dev/shm:/dev/shm
        -v /data/cache/huggingface:/github/home/.cache/huggingface
        -v /data/cache/huggingface:/root/.cache/huggingface
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni

      - name: Run thinker length integration test
        shell: bash
        run: |
          source omni/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_qwen3_omni_thinker_length.py -v -s -x
        env:
          HF_ENDPOINT: https://huggingface.co
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: thinker-length

  stage-2-tts:
    name: stage 2 - TTS speed + WER + SIM
    runs-on: [self-hosted, h100]
    timeout-minutes: 25
    container:
      image: crpi-n6adu6llixz83q37.cn-hangzhou.personal.cr.aliyuncs.com/hongccc/sglang-omni:dev
      options: >-
        --rm
        -e NVIDIA_VISIBLE_DEVICES=6,7
        --cap-add=SYS_PTRACE
        -v /dev/shm:/dev/shm
        -v /data/cache/huggingface:/github/home/.cache/huggingface
        -v /data/cache/huggingface:/root/.cache/huggingface
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni

      - name: Prepare speaker similarity assets
        shell: bash
        run: |
          source omni/bin/activate
          python -m benchmarks.metrics.speaker_similarity_assets --warm-cache
        env:
          HF_ENDPOINT: https://huggingface.co
          SEEDTTS_SIM_CACHE_DIR: /github/home/seedtts-wavlm-sim

      - name: Run TTS CI (speed + WER + SIM)
        shell: bash
        run: |
          source omni/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_qwen3_omni_tts_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://huggingface.co
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          SEEDTTS_SIM_CACHE_DIR: /github/home/seedtts-wavlm-sim
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS (speed + WER + SIM)
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
            */similarity_results.json
          artifact-upload-name: qwen3-omni-tts-results
          artifact-upload-path: /tmp/**/*_results.json

