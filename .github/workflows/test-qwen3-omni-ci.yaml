name: Qwen3-Omni CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: qwen3-omni-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    name: docs
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3
          install-deps: "true"

      - name: Run docs tests
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/docs/qwen3_omni/test_docs_qwen3_omni.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Kill GPU processes
        if: always()
        shell: bash
        run: |
          bash .github/scripts/delete_gpu_process.sh

      - name: Save cache
        if: always()
        shell: bash
        run: |
          if omni-qwen3/bin/python -c "import torch" 2>/dev/null; then
            rm -rf /github/home/omni-qwen3
            cp -p -r omni-qwen3 /github/home/
          else
            echo "::warning::Skipping cache save — venv appears corrupted (torch not importable)"
          fi

  stage-1-tts:
    name: stage 1 - TTS speed + WER
    needs: docs
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run TTS CI (speed + WER)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/test_model/test_qwen3_omni_tts_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS_MINI_DIR: /github/home/seedtts-mini

      - name: Print TTS CI artifacts (speed + WER)
        if: always()
        shell: bash
        run: |
          echo "=== Qwen3-Omni TTS CI results ==="
          for f in $(find /tmp -name "speed_results.json" -o -name "wer_results.json" 2>/dev/null); do
            echo "--- $f ---"
            cat "$f"
            echo ""
          done

      - name: Kill GPU processes
        if: always()
        shell: bash
        run: |
          bash .github/scripts/delete_gpu_process.sh

  stage-2-mmmu:
    name: stage 2 - MMMU accuracy + speed
    needs: stage-1-tts
    runs-on: [self-hosted]
    timeout-minutes: 20
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run MMMU CI (accuracy + speed)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/test_model/test_qwen3_omni_mmmu_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Print MMMU CI artifacts (accuracy + speed)
        if: always()
        shell: bash
        run: |
          echo "=== Qwen3-Omni MMMU CI results ==="
          for f in $(find /tmp -path '*/mmmu/mmmu_results.json' 2>/dev/null); do
            echo "--- $f ---"
            cat "$f"
            echo ""
          done

      - name: Kill GPU processes
        if: always()
        shell: bash
        run: |
          bash .github/scripts/delete_gpu_process.sh

  stage-3-mmmu-tts-consistency:
    name: stage 3 - MMMU TTS consistency
    needs: stage-2-mmmu
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run MMMU TTS Consistency CI (WER + speed)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/test_model/test_qwen3_omni_mmmu_tts_consistency_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Print MMMU TTS Consistency CI artifacts (WER + speed)
        if: always()
        shell: bash
        run: |
          echo "=== Qwen3-Omni MMMU TTS Consistency CI results ==="
          for f in $(find /tmp -path '*/mmmu_audio/mmmu_results.json' 2>/dev/null); do
            echo "--- $f ---"
            cat "$f"
            echo ""
          done

      - name: Kill GPU processes
        if: always()
        shell: bash
        run: |
          bash .github/scripts/delete_gpu_process.sh
