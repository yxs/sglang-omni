name: TTS CI

on:
  workflow_call:
    inputs:
      tts_ci_model:
        type: string
        default: higgs

env:
  OMNI_CI_HOME: >-
    ${{ github.event_name == 'pull_request'
        && format('/github/home/pr-{0}', github.event.pull_request.number)
        || format('/github/home/run-{0}', github.run_id) }}
  QWEN3_ASR_MODEL_PATH: Qwen/Qwen3-ASR-1.7B

# Invoked by omni-ci.yaml after PR Test (second suite in the omni-ci sequence:
# PR Test -> TTS -> Qwen3-Omni). Restores omni only.
# DAG:
#   stage-1-qwen3-asr            (independent)
#   stage-2-non-streaming --+
#   stage-3-streaming ------+
#                           +--> stage-4-consistency

jobs:
  stage-1-qwen3-asr:
    name: stage 1 - Qwen3-ASR correctness
    runs-on: [self-hosted, h100]
    timeout-minutes: 30
    container:
      image: crpi-n6adu6llixz83q37.cn-hangzhou.personal.cr.aliyuncs.com/hongccc/sglang-omni:dev
      options: >-
        --rm
        -e NVIDIA_VISIBLE_DEVICES=6,7
        -v /dev/shm:/dev/shm
        -v /data/cache/huggingface:/github/home/.cache/huggingface
        -v /data/cache/huggingface:/root/.cache/huggingface
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni

      - name: Run Qwen3-ASR correctness
        shell: bash
        run: |
          source omni/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_qwen3_asr_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://huggingface.co
          HF_HUB_DISABLE_XET: "1"
          HF_HUB_ENABLE_HF_TRANSFER: "0"
          HF_TOKEN: ${{ secrets.BOSON_HF_TOKEN }}
          QWEN3_ASR_MODEL_PATH: ${{ env.QWEN3_ASR_MODEL_PATH }}
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS stage 1 (Qwen3-ASR correctness)

  stage-2-non-streaming:
    name: stage 2 - non-streaming
    runs-on: [self-hosted, h100]
    timeout-minutes: 25
    container:
      image: crpi-n6adu6llixz83q37.cn-hangzhou.personal.cr.aliyuncs.com/hongccc/sglang-omni:dev
      options: >-
        --rm
        -e NVIDIA_VISIBLE_DEVICES=6,7
        -v /dev/shm:/dev/shm
        -v /data/cache/huggingface:/github/home/.cache/huggingface
        -v /data/cache/huggingface:/root/.cache/huggingface
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni

      - name: Prepare speaker similarity assets
        shell: bash
        run: |
          source omni/bin/activate
          python -m benchmarks.metrics.speaker_similarity_assets --warm-cache
        env:
          HF_ENDPOINT: https://huggingface.co
          SEEDTTS_SIM_CACHE_DIR: /github/home/seedtts-wavlm-sim

      - name: Run TTS non-streaming benchmark stage
        shell: bash
        run: |
          source omni/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_tts_ci.py -v -s -x --concurrency 16 --tts-stage tts-stage-1-nonstream
        env:
          HF_ENDPOINT: https://huggingface.co
          HF_TOKEN: ${{ secrets.BOSON_HF_TOKEN }}
          SEEDTTS_SIM_CACHE_DIR: /github/home/seedtts-wavlm-sim
          TTS_CI_MODEL: ${{ inputs.tts_ci_model }}
          TTS_STAGE_OUTPUT_ROOT: ${{ env.OMNI_CI_HOME }}/tts-stage-results/nonstream
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Upload non-streaming speed artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-stage-nonstream-speed-results
          path: ${{ env.OMNI_CI_HOME }}/tts-stage-results/nonstream/**/speed_results.json
          if-no-files-found: error
          retention-days: 7
          overwrite: true

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS stage 2 (non-streaming)
          artifact-search-root: ${{ env.OMNI_CI_HOME }}/tts-stage-results/nonstream
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
            */similarity_results.json

  stage-3-streaming:
    name: stage 3 - streaming
    runs-on: [self-hosted, h100]
    timeout-minutes: 25
    container:
      image: crpi-n6adu6llixz83q37.cn-hangzhou.personal.cr.aliyuncs.com/hongccc/sglang-omni:dev
      options: >-
        --rm
        -e NVIDIA_VISIBLE_DEVICES=6,7
        -v /dev/shm:/dev/shm
        -v /data/cache/huggingface:/github/home/.cache/huggingface
        -v /data/cache/huggingface:/root/.cache/huggingface
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni

      - name: Run TTS streaming benchmark stage
        shell: bash
        run: |
          source omni/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_tts_ci.py -v -s -x --concurrency 16 --tts-stage tts-stage-2-stream
        env:
          HF_ENDPOINT: https://huggingface.co
          HF_TOKEN: ${{ secrets.BOSON_HF_TOKEN }}
          TTS_CI_MODEL: ${{ inputs.tts_ci_model }}
          TTS_STAGE_OUTPUT_ROOT: ${{ env.OMNI_CI_HOME }}/tts-stage-results/stream
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Upload streaming speed artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-stage-stream-speed-results
          path: ${{ env.OMNI_CI_HOME }}/tts-stage-results/stream/**/speed_results.json
          if-no-files-found: error
          retention-days: 7
          overwrite: true

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS stage 3 (streaming)
          artifact-search-root: ${{ env.OMNI_CI_HOME }}/tts-stage-results/stream
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json

  stage-4-consistency:
    name: stage 4 - consistency
    needs: [stage-2-non-streaming, stage-3-streaming]
    runs-on: [self-hosted, h100]
    timeout-minutes: 5
    container:
      image: crpi-n6adu6llixz83q37.cn-hangzhou.personal.cr.aliyuncs.com/hongccc/sglang-omni:dev
      options: >-
        --rm
        -e NVIDIA_VISIBLE_DEVICES=6,7
        -v /dev/shm:/dev/shm
        -v /data/cache/huggingface:/github/home/.cache/huggingface
        -v /data/cache/huggingface:/root/.cache/huggingface
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni

      - name: Download non-streaming speed artifact
        uses: actions/download-artifact@v4
        with:
          name: tts-stage-nonstream-speed-results
          path: ${{ env.OMNI_CI_HOME }}/tts-stage-results/nonstream

      - name: Download streaming speed artifact
        uses: actions/download-artifact@v4
        with:
          name: tts-stage-stream-speed-results
          path: ${{ env.OMNI_CI_HOME }}/tts-stage-results/stream

      - name: Run consistency check
        shell: bash
        run: |
          source omni/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_tts_consistency_artifacts.py -v -s -x
        env:
          TTS_CI_MODEL: ${{ inputs.tts_ci_model }}
          TTS_STAGE1_SPEED_RESULTS_DIR: ${{ env.OMNI_CI_HOME }}/tts-stage-results/nonstream
          TTS_STAGE2_SPEED_RESULTS_DIR: ${{ env.OMNI_CI_HOME }}/tts-stage-results/stream
          TTS_CONSISTENCY_CONCURRENCY: "16"

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS stage 4 (consistency)
