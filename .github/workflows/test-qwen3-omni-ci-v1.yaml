name: Qwen3-Omni CI (v1)

on:
  pull_request:
    branches: [main]
    types: [labeled, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: qwen3-omni-ci-v1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# DAG:
#   docs ──► stage-1-thinker
#        ├─► stage-2-tts
#        ├─► stage-3-mmmu
#        ├─► stage-4-mmmu-talker
#        ├─► stage-5-mmsu
#        ├─► stage-6-mmsu-talker
#        ├─► stage-7-videomme
#        ├─► stage-8-videomme-talker
#        ├─► stage-9-videoamme
#        └─► stage-10-videoamme-talker
# All 10 stages run in parallel after docs passes — they are independent.

# Note (Chenyang):
# If running locally, use (env var is case-sensitive — must be SGLANG_OMNI_SERVER_VERSION):
# SGLANG_OMNI_SERVER_VERSION=v1     pytest tests/docs/qwen3_omni/test_docs_qwen3_omni.py -s -x
# SGLANG_OMNI_SERVER_VERSION=legacy pytest tests/docs/qwen3_omni/test_docs_qwen3_omni.py -s -x
# SGLANG_OMNI_SERVER_VERSION=v1     pytest tests/test_model/test_qwen3_omni_thinker_length.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=legacy pytest tests/test_model/test_qwen3_omni_thinker_length.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=v1     pytest tests/test_model/test_qwen3_omni_tts_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=legacy pytest tests/test_model/test_qwen3_omni_tts_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=v1     pytest tests/test_model/test_qwen3_omni_mmmu_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=legacy pytest tests/test_model/test_qwen3_omni_mmmu_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=v1     pytest tests/test_model/test_qwen3_omni_mmmu_talker_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=legacy pytest tests/test_model/test_qwen3_omni_mmmu_talker_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=v1     pytest tests/test_model/test_qwen3_omni_mmsu_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=legacy pytest tests/test_model/test_qwen3_omni_mmsu_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=v1     pytest tests/test_model/test_qwen3_omni_mmsu_talker_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=legacy pytest tests/test_model/test_qwen3_omni_mmsu_talker_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=v1     pytest tests/test_model/test_qwen3_omni_videomme_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=legacy pytest tests/test_model/test_qwen3_omni_videomme_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=v1     pytest tests/test_model/test_qwen3_omni_videomme_talker_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=legacy pytest tests/test_model/test_qwen3_omni_videomme_talker_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=v1     pytest tests/test_model/test_qwen3_omni_videoamme_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=legacy pytest tests/test_model/test_qwen3_omni_videoamme_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=v1     pytest tests/test_model/test_qwen3_omni_videoamme_talker_ci.py -v -s -x
# SGLANG_OMNI_SERVER_VERSION=legacy pytest tests/test_model/test_qwen3_omni_videoamme_talker_ci.py -v -s -x


jobs:
  docs:
    name: docs
    # CI gate — runs on workflow_dispatch, or on non-draft PRs carrying the `run-ci` label.
    # Keep in sync with the same gate in test.yaml / test-examples.yaml / test-s2pro-ci-v1.yaml.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3
          install-deps: "true"

      - name: Run docs tests
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/docs/qwen3_omni/test_docs_qwen3_omni.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: docs

      - name: Save cache
        if: always()
        shell: bash
        run: |
          if omni-qwen3/bin/python -c "import torch" 2>/dev/null; then
            rm -rf /github/home/omni-qwen3
            cp -p -r omni-qwen3 /github/home/
          else
            echo "::warning::Skipping cache save — venv appears corrupted (torch not importable)"
          fi

  stage-1-thinker:
    name: stage 1 - thinker length integration
    needs: docs
    runs-on: [self-hosted]
    timeout-minutes: 20
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run thinker length integration test
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/test_model/test_qwen3_omni_thinker_length.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: thinker-length

  stage-2-tts:
    name: stage 2 - TTS speed + WER
    needs: docs
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run TTS CI (speed + WER)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/test_model/test_qwen3_omni_tts_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS (speed + WER)
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
          artifact-upload-name: qwen3-omni-tts-results
          artifact-upload-path: /tmp/**/*_results.json

  stage-3-mmmu:
    name: stage 3 - MMMU accuracy + speed
