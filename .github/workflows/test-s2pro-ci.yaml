name: S2-Pro CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: s2pro-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    name: docs
    runs-on: [self-hosted]
    timeout-minutes: 10
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/s2pro-setup
        with:
          install-deps: "true"

      - name: Run docs tests
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/docs/s2pro/test_docs_tts_s2pro.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Kill GPU processes
        if: always()
        shell: bash
        run: |
          bash .github/scripts/delete_gpu_process.sh

      - name: Save cache
        if: always()
        run: |
          rm -rf /github/home/omni-s2pro
          cp -p -r omni-s2pro /github/home/

  stage-1-non-streaming:
    name: stage 1 - non-streaming
    needs: docs
    runs-on: [self-hosted]
    timeout-minutes: 5
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/s2pro-setup

      - name: Run benchmark stage
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/test_model/test_s2pro_tts_ci.py -v -s -x --concurrency 8 --s2pro-stage s2pro-stage-1-nonstream
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          S2PRO_STAGE_OUTPUT_ROOT: ${{ github.workspace }}/stage-results/nonstream

      - name: Print benchmark artifacts
        if: always()
        shell: bash
        run: |
          echo "=== stage 1 - non-streaming results ==="
          find stage-results/nonstream -name "speed_results.json" -o -name "wer_results.json" 2>/dev/null | sort | while read -r f; do
            echo "--- $f ---"
            cat "$f"
            echo ""
          done

      - name: Upload stage artifact
        uses: actions/upload-artifact@v4
        with:
          name: s2pro-stage-1-results
          path: stage-results/nonstream
          if-no-files-found: error

      - name: Kill GPU processes
        if: always()
        shell: bash
        run: |
          bash .github/scripts/delete_gpu_process.sh

  stage-2-streaming:
    name: stage 2 - streaming
    needs: stage-1-non-streaming
    runs-on: [self-hosted]
    timeout-minutes: 5
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/s2pro-setup

      - name: Run benchmark stage
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/test_model/test_s2pro_tts_ci.py -v -s -x --concurrency 8 --s2pro-stage s2pro-stage-2-stream
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          S2PRO_STAGE_OUTPUT_ROOT: ${{ github.workspace }}/stage-results/stream

      - name: Print benchmark artifacts
        if: always()
        shell: bash
        run: |
          echo "=== stage 2 - streaming results ==="
          find stage-results/stream -name "speed_results.json" -o -name "wer_results.json" 2>/dev/null | sort | while read -r f; do
            echo "--- $f ---"
            cat "$f"
            echo ""
          done

      - name: Upload stage artifact
        uses: actions/upload-artifact@v4
        with:
          name: s2pro-stage-2-results
          path: stage-results/stream
          if-no-files-found: error

      - name: Kill GPU processes
        if: always()
        shell: bash
        run: |
          bash .github/scripts/delete_gpu_process.sh

  stage-3-consistency:
    name: stage 3 - consistency
    needs: stage-2-streaming
    runs-on: [self-hosted]
    timeout-minutes: 5
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/s2pro-setup

      - name: Download stage 1 artifact
        uses: actions/download-artifact@v4
        with:
          name: s2pro-stage-1-results
          path: stage-artifacts/nonstream

      - name: Download stage 2 artifact
        uses: actions/download-artifact@v4
        with:
          name: s2pro-stage-2-results
          path: stage-artifacts/stream

      - name: Run benchmark stage
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/test_model/test_s2pro_tts_ci.py -v -s -x --concurrency 8 --s2pro-stage s2pro-stage-3-consistency
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          S2PRO_STAGE1_SPEED_RESULTS_DIR: ${{ github.workspace }}/stage-artifacts/nonstream
          S2PRO_STAGE2_SPEED_RESULTS_DIR: ${{ github.workspace }}/stage-artifacts/stream

      - name: Print benchmark artifacts
        if: always()
        shell: bash
        run: |
          echo "=== stage 3 - consistency inputs ==="
          find stage-artifacts -name "speed_results.json" -o -name "wer_results.json" 2>/dev/null | sort | while read -r f; do
            echo "--- $f ---"
            cat "$f"
            echo ""
          done

      - name: Kill GPU processes
        if: always()
        shell: bash
        run: |
          bash .github/scripts/delete_gpu_process.sh
