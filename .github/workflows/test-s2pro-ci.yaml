name: S2-Pro CI

on:
  pull_request:
    branches: [main]
    types: [labeled, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: s2pro-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OMNI_CI_HOME: >-
    ${{ github.event_name == 'pull_request'
        && format('/github/home/pr-{0}/s2pro', github.event.pull_request.number)
        || format('/github/home/run-{0}/s2pro', github.run_id) }}

# DAG:
#   setup (install-deps under OMNI_CI_HOME + verify model weights)
#     └── docs ──► stage-1-non-streaming ──┐
#              └── stage-2-streaming ──────┤
#                                         └──► stage-3-consistency
#           └── cleanup on full success only (kept on failure for re-run)

jobs:
  setup:
    name: setup - omni-s2pro venv
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-s2pro
          install-deps: "true"

      - uses: ./.github/actions/omni-save-cache
        with:
          venv-name: omni-s2pro

      - name: Ensure S2-Pro model weights
        shell: bash
        env:
          HF_ENDPOINT: https://hf-mirror.com
        run: bash .github/scripts/ensure_hf_models.sh omni-s2pro fishaudio/s2-pro

  docs:
    name: docs
    needs: setup
    # CI gate — runs on workflow_dispatch, or on non-draft PRs carrying the `run-ci` label.
    # Keep in sync with the same gate in test.yaml / test-examples.yaml / test-qwen3-omni-ci.yaml.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 10
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-s2pro

      - name: Run docs tests
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/docs/s2pro/test_docs_tts_s2pro.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: S2-Pro docs

  stage-1-non-streaming:
    name: stage 1 - non-streaming
    needs: [setup, docs]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-s2pro

      - name: Prepare speaker similarity assets
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          python -m benchmarks.metrics.speaker_similarity_assets --warm-cache
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SEEDTTS_SIM_CACHE_DIR: /github/home/seedtts-wavlm-sim

      - name: Run benchmark stage
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_s2pro_tts_ci.py -v -s -x --concurrency 16 --s2pro-stage s2pro-stage-1-nonstream
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          SEEDTTS_SIM_CACHE_DIR: /github/home/seedtts-wavlm-sim
          S2PRO_STAGE_OUTPUT_ROOT: ${{ github.workspace }}/stage-results/nonstream
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: S2-Pro stage 1 (non-streaming)
          artifact-search-root: stage-results/nonstream
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
            */similarity_results.json
          artifact-upload-name: s2pro-stage-1-results
          artifact-upload-path: stage-results/nonstream
          artifact-if-no-files-found: error

  stage-2-streaming:
    name: stage 2 - streaming
    needs: [setup, docs]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 5
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-s2pro

      - name: Run benchmark stage
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_s2pro_tts_ci.py -v -s -x --concurrency 16 --s2pro-stage s2pro-stage-2-stream
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          S2PRO_STAGE_OUTPUT_ROOT: ${{ github.workspace }}/stage-results/stream
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: S2-Pro stage 2 (streaming)
          artifact-search-root: stage-results/stream
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
          artifact-upload-name: s2pro-stage-2-results
          artifact-upload-path: stage-results/stream
          artifact-if-no-files-found: error

  stage-3-consistency:
    name: stage 3 - consistency
    needs: [stage-1-non-streaming, stage-2-streaming]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependency
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Download stage 1 artifact
        uses: actions/download-artifact@v4
        with:
          name: s2pro-stage-1-results
          path: stage-artifacts/nonstream

      - name: Download stage 2 artifact
        uses: actions/download-artifact@v4
        with:
          name: s2pro-stage-2-results
          path: stage-artifacts/stream

      - name: Run consistency check
        shell: bash
        run: |
          export PYTHONPATH=$PWD
          python -m pytest tests/test_model/test_s2pro_consistency_artifacts.py -v -s -x
        env:
          S2PRO_STAGE1_SPEED_RESULTS_DIR: ${{ github.workspace }}/stage-artifacts/nonstream
          S2PRO_STAGE2_SPEED_RESULTS_DIR: ${{ github.workspace }}/stage-artifacts/stream
          S2PRO_CONSISTENCY_CONCURRENCY: "16"

  cleanup:
    name: cleanup - reclaim host cache
    needs:
      - setup
      - docs
      - stage-1-non-streaming
      - stage-2-streaming
      - stage-3-consistency
    if: >-
      success() &&
      (github.event_name == 'workflow_dispatch' ||
       (!github.event.pull_request.draft &&
        contains(github.event.pull_request.labels.*.name, 'run-ci')))
    runs-on: [self-hosted]
    timeout-minutes: 5
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-cleanup-host
        with:
          ci-home: ${{ env.OMNI_CI_HOME }}
