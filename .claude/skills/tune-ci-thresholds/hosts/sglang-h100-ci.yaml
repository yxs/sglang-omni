# In-container calibration layout — sglang-h100-ci
#
# Used by tune.py inside an already-running repro container (hostname match
# or --host sglang-h100-ci). User starts the container; this file only records
# paths and env overrides for calibration — not how to launch Docker.

name: sglang-h100-ci
hostname: sglang-h100-ci

repo_root: /data/sglang-omni
venv_python: /github/home/calibration/omni/bin/python

physical:
  hf_hub: /root/.cache/huggingface
  speaker_sim: /root/.cache/huggingface/speaker_sim
  omni_ci_home: /github/home/calibration

# tune.py maps physical.* → auto_env (HF_HOME, SEEDTTS_SIM_CACHE_DIR, …).
# No symlinks. precheck reads these paths directly.
# Full agent checklist: ../AGENT-PRECHECK.md

precheck_checklist:
  repo_root_exists: /data/sglang-omni/pyproject.toml
  venv_exists: /github/home/calibration/omni/bin/python
  hf_hub: /root/.cache/huggingface
  speaker_sim:
    dir: /root/.cache/huggingface/speaker_sim
    files: [wavlm_large.pt, wavlm_large_finetune.pth, .complete]
  omni_ci_home: /github/home/calibration
  tune_py:
    - "python .claude/skills/tune-ci-thresholds/tune.py --model tts precheck --output-dir /tmp/precheck_tts"
    - "python .claude/skills/tune-ci-thresholds/tune.py --model qwen3-omni-v1 precheck --output-dir /tmp/precheck_qwen3"

speaker_similarity_bootstrap:
  warm_cache:
    env:
      HF_ENDPOINT: https://huggingface.co
      HF_HUB_DISABLE_XET: "1"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      SEEDTTS_SIM_CACHE_DIR: /root/.cache/huggingface/speaker_sim
    hf_token: "source ~/.zshrc"
    command: |
      cd /data/sglang-omni
      /github/home/calibration/omni/bin/python -m benchmarks.metrics.speaker_similarity_assets --warm-cache

agent_policy:
  env_check: report_missing_first
  poll_interval_max_s: 120

handoff:
  goal: "Full CI calibration — tts ALL r5, then qwen3-omni-v1 ALL r5"
  speaker_sim_complete: false
  calibration_started: false
  run_dirs: []
