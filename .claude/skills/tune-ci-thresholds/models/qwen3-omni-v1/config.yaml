# Model-specific config for the qwen3-omni CI threshold skill.
name: qwen3-omni-v1
description: "Qwen3-Omni 30B-A3B Instruct (Talker + Thinker)"
hf_model_id: "Qwen/Qwen3-Omni-30B-A3B-Instruct"
# Extra model checkpoints required by tests that do not use hf_model_id.
hf_model_ids_by_test:
  test_qwen3_omni_videoamme_talker_tp2_ci.py:
    - "marksverdhei/Qwen3-Omni-30B-A3B-FP8"
hf_datasets:
  - "zhaochenyang20/mmsu-ci-2000"
  - "zhaochenyang20/mmmu-ci-50"
  - "zhaochenyang20/seed-tts-eval-50-arrow"
  - "zhaochenyang20/Video_MME_ci"
  - "zhaochenyang20/Video_AMME_ci"
# CI uses OMNI_CI_HOME=/github/home/pr-<N>/qwen3 on Actions runners.
# Calibration uses a fixed slice with the same layout (no PR number).
omni_ci_home: "/github/home/calibration/qwen3"
default_venv_python:
  - "/sgl-workspace/sglang-omni/omni-qwen3/bin/python"
  - "/github/home/calibration/qwen3/omni-qwen3/bin/python"
  - "/github/home/omni-qwen3/bin/python"
# CI's omni-qwen3 venv has openai-whisper installed, so
# `_get_en_normalizer()` resolves to whisper.normalizers.EnglishTextNormalizer
# (contractions expanded, numbers→words, etc.). precheck warns if the local
# venv falls back to the punctuation-strip path.
expected_wer_normalizer: "english"
# Env vars tune.py applies at startup (matches .github/actions/omni-setup).
auto_env:
  HOME: "/github/home"
  OMNI_CI_HOME: "/github/home/calibration/qwen3"
  HF_HOME: "/github/home/.cache/huggingface"
  MODELSCOPE_CACHE: "/github/home/.cache/modelscope"
  XDG_CACHE_HOME: "/github/home/calibration/qwen3/.cache"
  HF_ENDPOINT: "https://hf-mirror.com"
  HF_HUB_DISABLE_XET: "1"
  UV_INDEX_URL: "https://pypi.tuna.tsinghua.edu.cn/simple"
  UV_CACHE_DIR: "/github/home/.cache/uv"
  TORCHINDUCTOR_CACHE_DIR: "/github/home/calibration/qwen3/.torchinductor"
  FLASHINFER_DISABLE_VERSION_CHECK: "1"
# Number of GPUs each test needs. tune.py picks that many free GPUs
# via CUDA_VISIBLE_DEVICES before each pytest invocation. Qwen benchmark CI
# runs one router plus two colocated one-GPU workers, so stages need 2.
gpus_per_test:
  test_qwen3_omni_mmmu_ci.py: 2
  test_qwen3_omni_mmsu_ci.py: 2
  test_qwen3_omni_videomme_ci.py: 2
  test_qwen3_omni_videoamme_ci.py: 2
  test_qwen3_omni_tts_ci.py: 2
  test_qwen3_omni_mmmu_talker_ci.py: 2
  test_qwen3_omni_mmsu_talker_ci.py: 2
  test_qwen3_omni_videomme_talker_ci.py: 2
  test_qwen3_omni_videoamme_talker_ci.py: 2
  test_qwen3_omni_videoamme_talker_tp2_ci.py: 2
test_globs:
  - "tests/test_model/test_qwen3_omni_*_ci.py"
# Per-test extra env vars. Key is the test filename (basename).
extra_env: {}
# Stage-key base derivation: strip prefix + strip suffix from the test stem.
stage_base_strip_prefix: "test_qwen3_omni_"
stage_base_strip_suffix: "_ci"
# Per-test metric source JSONs. `json_file` is relative to pytest's
# `--basetemp` dir (set fresh per run by tune.py). `paths` maps a
# recognized metric key (accuracy / corpus_wer / per_sample_wer_max /
# wer_below_50_corpus / n_above_50 /
# throughput_qps / output_tok_per_req_s / latency_mean_s / latency_p95_s /
# rtf_mean) to the
# dotted JSON key chain that yields a number.
# When a metric pulls from a different JSON than `json_file`, use the
# `<file>::<dotted.path>` inline form as the value instead of a bare
# dotted path.
metric_sources:
  test_qwen3_omni_mmmu_ci.py:
    json_file: "test_mmmu_accuracy_and_speed0/mmmu/mmmu_results.json"
    sample_counts:
      total: "summary.total_samples"
      ok: "speed.completed_requests"
    paths:
      accuracy: "summary.accuracy"
      throughput_qps: "speed.throughput_qps"
      output_tok_per_req_s: "speed.output_tok_per_req_s"
      latency_mean_s: "speed.latency_mean_s"
  test_qwen3_omni_mmmu_talker_ci.py:
    json_file: "test_mmmu_audio_wer_and_speed0/mmmu_audio/mmmu_results.json"
    sample_counts:
      total: "summary.total_samples"
      ok: "speed.completed_requests"
    paths:
      accuracy: "summary.accuracy"
      wer_below_50_corpus: "wer.summary.wer_below_50_corpus"
      n_above_50: "wer.summary.n_above_50_pct_wer"
      throughput_qps: "speed.throughput_qps"
      output_tok_per_req_s: "speed.output_tok_per_req_s"
      latency_mean_s: "speed.latency_mean_s"
      rtf_mean: "speed.rtf_mean"
  test_qwen3_omni_mmsu_ci.py:
    json_file: "test_mmsu_accuracy_and_speed0/mmsu/mmsu_results.json"
    sample_counts:
      total: "summary.total_samples"
      ok: "summary.successful_samples"
    paths:
      accuracy: "summary.overall_accuracy"
      throughput_qps: "speed_metrics.throughput_qps"
      output_tok_per_req_s: "speed_metrics.output_tok_per_req_s"
      latency_mean_s: "speed_metrics.latency_mean_s"
  test_qwen3_omni_mmsu_talker_ci.py:
    json_file: "test_mmsu_audio_wer_and_speed0/mmsu_audio/mmsu_results.json"
    sample_counts:
      total: "summary.total_samples"
      ok: "summary.successful_samples"
    paths:
      accuracy: "summary.overall_accuracy"
      wer_below_50_corpus: "wer.summary.wer_below_50_corpus"
      n_above_50: "wer.summary.n_above_50_pct_wer"
      throughput_qps: "speed_metrics.throughput_qps"
      output_tok_per_req_s: "speed_metrics.output_tok_per_req_s"
      latency_mean_s: "speed_metrics.latency_mean_s"
      rtf_mean: "speed_metrics.rtf_mean"
  test_qwen3_omni_videomme_ci.py:
    json_file: "test_videomme_accuracy_and_spe0/videomme/videomme_results.json"
    sample_counts:
      total: "summary.total_samples"
      ok: "speed.completed_requests"
    paths:
      accuracy: "summary.accuracy"
      throughput_qps: "speed.throughput_qps"
      output_tok_per_req_s: "speed.output_tok_per_req_s"
      latency_mean_s: "speed.latency_mean_s"
  test_qwen3_omni_videomme_talker_ci.py:
    json_file: "test_videomme_tts_accuracy_wer0/videomme_audio/videomme_results.json"
    sample_counts:
