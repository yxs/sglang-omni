# running-eval-suite config — every reference table row across the
# 6 benchmarks/eval/benchmark_*.py files is described here.
#
# `running-eval-suite` reads each row, runs the server + client, then
# either replaces the matching row in the benchmark .py file (same
# hardware tag) or appends a new row at the end of that section's
# table (new hardware). "Local v1 Pipeline Result" sections are
# always skipped — those are contributors' personal experiments, not
# refresh targets.
#
# Schema (per row):
#   id                          handle (informational; row selection is by --benchmarks short name)
#   file                        path (relative to repo root) of the benchmark .py
#   hf_model_id                 (optional) overrides the config-level default; needed for s2-pro rows
#   locate.section_substring    substring of the section header above the table (e.g. "Accuracy (accuracy)")
#   locate.config_substring     substring of the row's Config cell (e.g. "modalities=text ")
#   locate.source_workload      workload tag WITHOUT the [hardware,] prefix; e.g. "router, 2-worker, full-set, c=8".
#                               At runtime the skill prepends the detected hw tag → "[H200, router, 2-worker, full-set, c=8]"
#   server_profile              optional server profile override. If omitted,
#                               default_server_profile or server_profile_by_hf_model_id is used.
#   server                      legacy direct server launch template fallback
#   server_extra_by_hardware    optional hardware tag -> extra server args appended to server or profiled worker args
#   server_gpus                 legacy direct server GPU count fallback
#   server_health               optional health URL ({port} substituted), defaults to /health
#   server_boot_timeout_s       optional seconds to wait for /health 2xx; profiles own this by default
#   client                      client launch template; {port} {output_dir} {model} {asr_gpu} substituted.
#                               {asr_gpu} = "cuda:N" of a GPU not given to the server
#                               (or "cpu" if no free GPUs left); use in --asr-device / --device flags.
#   result_json                 path under output_dir where the client writes its JSON
#   cells                       column header → { path, format } OR { paths: { alias: ... }, format }

name: qwen3-omni
description: "Reference benchmarks for Qwen3-Omni 30B-A3B-Instruct + S2-Pro TTS"

# Default model ID; per-row hf_model_id overrides this (s2-pro rows do).
hf_model_id: "Qwen/Qwen3-Omni-30B-A3B-Instruct"

hf_datasets:
  - "ddwang2000/MMSU"
  - "MMMU/MMMU"
  - "zhaochenyang20/Video_MME"
  - "zhaochenyang20/Video_AMME_ci"
  - "zhaochenyang20/Video_MME_ci"
  - "zhaochenyang20/seed-tts-eval-arrow"

# Auxiliary scoring resources — orthogonal to the main model+dataset; without
# them rows usually run-to-completion but skip every sample at the ASR/WER
# step (silent quality fail), or fail-fast at meta-file lookup. precheck
# verifies each is in place and prints the exact install command otherwise.
auxiliary_models:
  - kind: hf
    id: "openai/whisper-large-v3"
    install_cmd: "huggingface-cli download openai/whisper-large-v3"
    used_for: "EN WER ASR (mmsu+audio, mmmu+audio, seedtts EN, videoamme talker)"
  - kind: modelscope
    id: "iic/speech_seaco_paraformer_large_asr_nat-zh-cn-16k-common-vocab8404-pytorch"
    install_cmd: "<venv-python> -c 'from funasr import AutoModel; AutoModel(model=\"paraformer-zh\")'"
    used_for: "ZH WER ASR (auto-downloaded by funasr's AutoModel('paraformer-zh'))"

python_packages:
  - name: "funasr"
    install_cmd: "uv pip install funasr"
    used_for: "ZH ASR runtime (AutoModel('paraformer-zh'))"
  - name: "zhconv"
    install_cmd: "uv pip install zhconv"
    used_for: "ZH transcribe (T↔S conversion); MISSING SILENTLY SKIPS ALL ZH SAMPLES"
  - name: "zhon"
    install_cmd: "uv pip install zhon"
    used_for: "ZH punctuation set used by normalize_text(text, 'zh')"

default_venv_python:
  - "/sgl-workspace/sglang-omni/.venv/bin/python"
  - "/sgl-workspace/sglang-omni/omni-qwen3/bin/python"
  - "/github/home/calibration/qwen3/omni-qwen3/bin/python"
  - "/github/home/omni-qwen3/bin/python"
  - "/data/sglang-omni/omni-qwen3/bin/python"

# Matches .github/actions/omni-setup (calibration slice = /github/home/calibration/qwen3).
omni_ci_home: "/github/home/calibration/qwen3"
auto_env:
  HOME: "/github/home"
  OMNI_CI_HOME: "/github/home/calibration/qwen3"
  HF_HOME: "/github/home/.cache/huggingface"
  MODELSCOPE_CACHE: "/github/home/.cache/modelscope"
  XDG_CACHE_HOME: "/github/home/calibration/qwen3/.cache"
  HF_ENDPOINT: "https://hf-mirror.com"
  HF_HUB_DISABLE_XET: "1"
  UV_INDEX_URL: "https://pypi.tuna.tsinghua.edu.cn/simple"
  UV_CACHE_DIR: "/github/home/.cache/uv"
  TORCHINDUCTOR_CACHE_DIR: "/github/home/calibration/qwen3/.torchinductor"
  FLASHINFER_DISABLE_VERSION_CHECK: "1"

default_server_profile: qwen3_omni_colocated_router

server_profile_by_hf_model_id:
  fishaudio/s2-pro: s2pro_router

server_profiles:
  qwen3_omni_colocated_router:
    server_gpus: 2
    model_name: qwen3-omni
    num_workers: 2
    num_gpus_per_worker: 1
    worker_extra_args: "--config {repo_root}/examples/configs/qwen3_omni_colocated.yaml --colocate"
    wait_timeout: 600
    server_boot_timeout_s: 660
    router_policy: least_request
  qwen3_omni_video_router:
    server_gpus: 2
    model_name: qwen3-omni
    num_workers: 2
    num_gpus_per_worker: 1
    worker_extra_args: "--config {repo_root}/examples/configs/qwen3_omni_colocated.yaml --colocate --stages.0.factory-args.thinker-max-seq-len 32768 --stages.4.factory-args.thinker-max-seq-len 32768"
    wait_timeout: 600
    server_boot_timeout_s: 660
    router_policy: least_request
  qwen3_omni_mmsu_router:
    server_gpus: 2
    model_name: qwen3-omni
    num_workers: 2
    num_gpus_per_worker: 1
    worker_extra_args: "--config {repo_root}/examples/configs/qwen3_omni_mmsu.yaml --text-only"
    wait_timeout: 600
    server_boot_timeout_s: 660
    router_policy: least_request
  s2pro_router:
    server_gpus: 2
    model_name: fishaudio/s2-pro
    num_workers: 2
    num_gpus_per_worker: 1
    worker_extra_args: "--config {repo_root}/examples/configs/s2pro_tts.yaml"
    wait_timeout: 180
    server_boot_timeout_s: 240
    router_policy: least_request

rows:
  # ===================== mmsu (Qwen3-Omni text-only) =====================
  - id: mmsu-text-c8-accuracy
    file: "benchmarks/eval/benchmark_omni_mmsu.py"
    server_profile: qwen3_omni_mmsu_router
    locate:
      section_substring: "Accuracy (accuracy)"
      config_substring: "modalities=text "
      source_workload: "router, 2-worker, full-set, c=8"
    client: "python benchmarks/eval/benchmark_omni_mmsu.py --model qwen3-omni --port {port} --modalities text --max-concurrency 8 --output-dir {output_dir}"
    result_json: "mmsu_results.json"
    cells:
      overall_accuracy:    { path: "summary.overall_accuracy", format: "{v:.2%}" }
      parseable_samples:   { paths: { v: "summary.parseable_samples", t: "summary.total_samples" }, format: "{v}/{t}" }
      unparseable_samples: { path: "summary.unparseable_samples", format: "{v}" }

  - id: mmsu-text-audio-c8-accuracy
    file: "benchmarks/eval/benchmark_omni_mmsu.py"
    server_profile: qwen3_omni_mmsu_router
